name: Fixture assertions

on:
  push:
  pull_request:

jobs:
  fixture-risks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Assert fixture risk levels
        run: python3 -m unittest discover -s tests -v
